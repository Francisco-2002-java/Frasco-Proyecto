<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Rincón Especial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff5f5; color: #881337; overflow: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes float { 
          from { transform: translateY(0) rotate(0deg); } 
          to { transform: translateY(-20px) rotate(10deg); } 
        }
        
        .animate-float { animation: float 3s infinite ease-in-out alternate; }
        
        .jar-container {
            background: rgba(255, 255, 255, 0.3);
            border: 6px solid rgba(255, 255, 255, 0.8);
            border-radius: 60px 60px 100px 100px;
            box-shadow: 0 20px 50px rgba(251, 113, 133, 0.2);
            backdrop-filter: blur(4px);
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .jar-lid {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 144px;
            height: 40px;
            background: #be123c;
            border-radius: 12px;
            z-index: 20;
        }

        .heart {
            position: absolute;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 60;
            background: rgba(136, 19, 55, 0.1);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .music-bar { width: 4px; background: #fb7185; border-radius: 2px; height: 10px; }
        .animate-bounce-slow { animation: bounceCustom 0.6s infinite alternate; }
        @keyframes bounceCustom { from { height: 6px; } to { height: 18px; } }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <video id="bgMusic" loop style="display:none;" playsinline></video>

        <header class="mb-10">
            <h1 id="greeting" class="text-4xl md:text-5xl font-serif italic mb-2">Hola, mi vida</h1>
            <p id="subHeader" class="text-rose-400 font-light tracking-widest text-sm uppercase">Un rincón solo para nosotros</p>
        </header>

        <div class="jar-container w-64 h-[380px] md:w-72 md:h-[420px]" id="jar">
            <div class="jar-lid"></div>
            <div id="heartsSpace" class="relative w-full h-full overflow-hidden p-6"></div>
            
            <div id="musicIndicator" class="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-1 items-end opacity-0 transition-opacity duration-500">
                <div class="music-bar animate-bounce-slow"></div>
                <div class="music-bar animate-bounce-slow" style="animation-delay: 0.2s"></div>
                <div class="music-bar animate-bounce-slow" style="animation-delay: 0.4s"></div>
            </div>
        </div>

        <form id="motivoForm" class="mt-12 w-full max-w-xs relative">
            <input type="text" id="motivoInput" placeholder="Escribe un motivo..." 
                class="w-full bg-white border-2 border-rose-100 px-6 py-4 rounded-full shadow-sm outline-none focus:border-rose-300 text-rose-900">
            <button type="submit" class="absolute right-2 top-2 bg-rose-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </form>

        <button id="openConfig" class="fixed bottom-8 right-8 w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center text-rose-500 hover:bg-rose-50 z-40 border border-rose-50">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        </button>
    </div>

    <div id="configModal" class="modal">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-sm" onclick="event.stopPropagation()">
            <h3 class="text-xl font-serif italic text-rose-800 mb-4">Nuestra Música</h3>
            <form id="musicForm" class="mb-4 flex gap-2">
                <input type="text" id="musicInput" placeholder="Enlace .mp3" class="flex-1 border-b border-rose-100 py-2 text-xs">
                <button type="submit" class="text-rose-500 text-xs font-bold">AÑADIR</button>
            </form>
            <div id="musicList" class="max-h-40 overflow-y-auto space-y-2"></div>
            <button onclick="closeConfig()" class="mt-4 text-rose-300 text-xs w-full">CERRAR</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl text-center max-w-xs" onclick="event.stopPropagation()">
            <p id="modalText" class="text-2xl text-rose-900 font-serif italic"></p>
            <button onclick="closeModal()" class="mt-8 text-rose-400 text-sm uppercase">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Obtener configuración de las variables de entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const video = document.getElementById('bgMusic');
        video.volume = 0.5;

        let playlist = [];
        let isPlaying = false;
        let user = null;

        // Inicialización de Autenticación (REGLA 3)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Error en la autenticación inicial:", error);
            }
        };

        // Escuchar cambios de estado de autenticación
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                setupListeners();
            }
        });

        // Configuración de Listeners con manejo de errores (REGLA 1 y 2)
        function setupListeners() {
            if (!user) return;

            // Motivos - Ruta específica requerida por REGLA 1
            const motivosCol = collection(db, 'artifacts', appId, 'public', 'data', 'motivos');
            onSnapshot(motivosCol, 
                (snapshot) => {
                    const space = document.getElementById('heartsSpace');
                    space.innerHTML = '';
                    snapshot.docs.forEach(doc => {
                        const data = doc.data();
                        createHeart(data.texto, data.x, data.y, data.color);
                    });
                },
                (error) => console.error("Error en motivos snapshot:", error)
            );

            // Playlist - Ruta específica requerida por REGLA 1
            const playlistCol = collection(db, 'artifacts', appId, 'public', 'data', 'playlist');
            onSnapshot(playlistCol, 
                (snapshot) => {
                    playlist = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
                    if (playlist.length > 0 && !video.src) video.src = playlist[0].url;
                    renderPlaylist();
                },
                (error) => console.error("Error en playlist snapshot:", error)
            );
        }

        function createHeart(texto, x, y, color) {
            const el = document.createElement('div');
            el.className = 'heart animate-float';
            el.innerHTML = '❤️';
            el.style.left = `${x}%`;
            el.style.top = `${y}%`;
            el.style.color = color || '#f43f5e';
            el.onclick = (e) => {
                e.stopPropagation();
                openModal(texto);
            };
            document.getElementById('heartsSpace').appendChild(el);
        }

        function renderPlaylist() {
            const list = document.getElementById('musicList');
            list.innerHTML = '';
            playlist.forEach((item) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 p-2 rounded-xl bg-rose-50/50 text-[10px] text-rose-800";
                div.innerHTML = `
                    <span class="flex-1 truncate">${item.url}</span>
                    <button class="text-rose-300 hover:text-rose-600" onclick="deleteSong('${item.id}')">✕</button>
                `;
                list.appendChild(div);
            });
        }

        window.deleteSong = async (id) => {
            if (!user) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'playlist', id));
            } catch (e) {
                console.error("Error al borrar canción:", e);
            }
        };

        function openModal(text) {
            document.getElementById('modalText').innerText = text;
            document.getElementById('modal').classList.add('active');
        }

        window.closeModal = () => document.getElementById('modal').classList.remove('active');
        window.closeConfig = () => document.getElementById('configModal').classList.remove('active');
        document.getElementById('openConfig').onclick = () => document.getElementById('configModal').classList.add('active');

        document.getElementById('motivoForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('motivoInput');
            if (!input.value.trim() || !user) return;
            
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'motivos'), {
                    texto: input.value,
                    x: 10 + Math.random() * 80,
                    y: 15 + Math.random() * 70,
                    color: '#f43f5e',
                    createdAt: serverTimestamp()
                });
                input.value = '';
            } catch (e) {
                console.error("Error al añadir motivo:", e);
            }
        };

        document.getElementById('musicForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('musicInput');
            if (!input.value.trim() || !user) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'playlist'), {
                    url: input.value,
                    createdAt: serverTimestamp()
                });
                input.value = '';
            } catch (e) {
                console.error("Error al añadir música:", e);
            }
        };

        // Arrancar autenticación
        initAuth();
    </script>
</body>
</html>
