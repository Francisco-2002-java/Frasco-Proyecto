<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Rincón Especial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff5f5; color: #881337; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes float { 
          from { transform: translateY(0) rotate(0deg); } 
          to { transform: translateY(-15px) rotate(5deg); } 
        }
        
        .animate-float { animation: float 3s infinite ease-in-out alternate; }
        
        .jar-container {
            background: rgba(255, 255, 255, 0.4);
            border: 6px solid rgba(255, 255, 255, 0.8);
            border-radius: 60px 60px 100px 100px;
            box-shadow: 0 20px 50px rgba(251, 113, 133, 0.2);
            backdrop-filter: blur(8px);
            position: relative;
        }

        .jar-lid {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 40px;
            background: #be123c;
            border-radius: 12px;
            z-index: 20;
        }

        .heart {
            position: absolute;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }
        .heart:hover { transform: scale(1.3); }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <audio id="audioElement" loop></audio>

        <header class="mb-8">
            <h1 id="greeting" class="text-4xl md:text-5xl font-serif italic mb-2 text-rose-800">Hola, mi vida</h1>
            <p class="text-rose-400 font-light tracking-widest text-xs uppercase">Conectado a nuestro frasco real</p>
        </header>

        <div class="jar-container w-64 h-[380px] md:w-72 md:h-[420px]" id="jar">
            <div class="jar-lid"></div>
            <div id="heartsSpace" class="relative w-full h-full overflow-hidden p-6"></div>
        </div>

        <form id="motivoForm" class="mt-8 w-full max-w-xs relative">
            <input type="text" id="motivoInput" placeholder="Escribe algo para siempre..." 
                class="w-full bg-white/80 border-2 border-rose-100 px-6 py-4 rounded-full shadow-sm outline-none focus:border-rose-300 text-rose-900">
            <button type="submit" class="absolute right-2 top-2 bg-rose-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </form>

        <div class="fixed bottom-6 right-6 flex flex-col gap-3">
            <button id="toggleMusic" class="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center text-rose-500 border border-rose-100">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            </button>
        </div>
    </div>

    <div id="msgModal" class="modal" onclick="closeMsg()">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl text-center max-w-xs border-t-8 border-rose-400" onclick="event.stopPropagation()">
            <p id="msgText" class="text-xl text-rose-900 font-serif italic"></p>
            <button onclick="closeMsg()" class="mt-8 text-rose-300 text-xs font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Variables globales inyectadas por el entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mi-frasco-eterno';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // 1. Autenticación (REGLA 3)
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                startSync();
            }
        });

        // 2. Sincronización en tiempo real (REGLA 1: Rutas estrictas)
        function startSync() {
            // Usamos la ruta pública definida en las reglas: /artifacts/{appId}/public/data/{collection}
            const motivosRef = collection(db, 'artifacts', appId, 'public', 'data', 'motivos');
            
            onSnapshot(motivosRef, (snapshot) => {
                const space = document.getElementById('heartsSpace');
                space.innerHTML = '';
                snapshot.docs.forEach(doc => {
                    createHeartUI(doc.data());
                });
            }, (error) => {
                console.error("Error en Firestore:", error);
            });
        }

        function createHeartUI(data) {
            const el = document.createElement('div');
            el.className = 'heart animate-float';
            el.innerHTML = '❤️';
            el.style.left = data.x + '%';
            el.style.top = data.y + '%';
            el.onclick = () => {
                document.getElementById('msgText').innerText = data.texto;
                document.getElementById('msgModal').classList.add('active');
            };
            document.getElementById('heartsSpace').appendChild(el);
        }

        // 3. Guardar nuevo motivo
        document.getElementById('motivoForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('motivoInput');
            const texto = input.value.trim();
            if(!texto || !currentUser) return;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'motivos'), {
                    texto: texto,
                    x: 10 + Math.random() * 80,
                    y: 15 + Math.random() * 70,
                    timestamp: serverTimestamp()
                });
                input.value = '';
            } catch (err) {
                console.error("Error al guardar:", err);
            }
        };

        window.closeMsg = () => document.getElementById('msgModal').classList.remove('active');

        initAuth();
    </script>
</body>
</html>
